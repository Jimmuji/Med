name: Medical AI Daily

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = Beijing 09:00, far-fallback
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.deepseek.com' }}
          API_MODEL: ${{ vars.API_MODEL || 'deepseek-chat' }}
        run: cd scripts && python main.py

      - name: Commit and push
        run: |
          git config user.name "Medical AI Bot"
          git config user.email "bot@github.com"
          git add daily/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Shanghai date +"%Y-%m-%d")
            git commit -m "🏥 Medical AI Daily for ${DATE}"
            git pull --rebase
            git push
          fi
